services:
  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      # api talks to the mongo service by its Compose network name,
      # not localhost — overrides whatever MONGO_URI is set in .env
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
